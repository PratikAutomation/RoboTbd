<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
<title>RoboLink · Factory Twin (3D)</title>
<style>
  :root {
    --bg:#060a10; --edge:#4ee5ff; --dim:#1f6478; --hud:#5b8a96;
    --f1:#a8ff5e; --f2:#5ec8ff; --f3:#ffb84e; --f4:#ff5ec8;
    --running:#4ee5ff; --idle:#5b8a96; --maint:#ffb84e; --err:#ff5e5e; --off:#3a3a3a;
  }
  * { box-sizing: border-box; }
  body { margin:0; overflow:hidden; background:var(--bg); font-family:ui-monospace,monospace; color:var(--hud); user-select:none; -webkit-user-select:none; }
  canvas { display:block; cursor:grab; } canvas:active { cursor:grabbing; }

  /* HUD corners */
  .hud { position:fixed; font-size:10px; letter-spacing:0.18em; text-transform:uppercase; pointer-events:none; transition: opacity 0.3s; }
  .tl{top:80px;left:16px;} .tr{top:16px;right:16px;text-align:right;}
  .brand-logo { position:fixed; top:14px; left:18px; height:54px; width:auto; z-index:12; pointer-events:none; }
  .bl{bottom:16px;left:16px;} .br{bottom:16px;right:16px;text-align:right;}
  .hud .v{color:var(--edge);} .hud .f1{color:var(--f1);} .hud .f2{color:var(--f2);} .hud .f3{color:var(--f3);} .hud .f4{color:var(--f4);}
  .hud .label{opacity:0.5;display:block;font-size:9px;margin-bottom:3px;} .hud .row{margin-top:8px;}
  .dot{display:inline-block;width:6px;height:6px;border-radius:50%;margin-right:6px;vertical-align:1px;animation:pulse 1.2s ease-in-out infinite;background:var(--edge);}
  @keyframes pulse{0%,100%{opacity:1;}50%{opacity:0.3;}}
  .corner{position:fixed;width:22px;height:22px;border:1px solid var(--edge);opacity:0.4;}
  .c1{top:8px;left:8px;border-right:none;border-bottom:none;} .c2{top:8px;right:8px;border-left:none;border-bottom:none;}
  .c3{bottom:8px;left:8px;border-right:none;border-top:none;} .c4{bottom:8px;right:8px;border-left:none;border-top:none;}
  .scan{position:fixed;inset:0;pointer-events:none;background:repeating-linear-gradient(0deg,transparent 0 3px,rgba(78,229,255,0.018) 3px 4px);}

  /* Back button & hint */
  .back-btn {
    position: fixed; top: 16px; left: 78px;
    background: rgba(78,229,255,0.12); color: var(--edge); border: 1px solid var(--edge);
    padding: 10px 14px; font: inherit; font-size: 10px; letter-spacing: 0.2em;
    text-transform: uppercase; cursor: pointer; display: none; z-index: 10;
  }
  .back-btn:hover, .back-btn:active { background: rgba(78,229,255,0.28); }
  .floor-hint {
    position: fixed; bottom: 60px; left: 50%; transform: translateX(-50%);
    color: var(--edge); font-size: 10px; letter-spacing: 0.25em; text-transform: uppercase;
    pointer-events: none; opacity: 0.7; animation: blink 2s ease-in-out infinite;
  }
  @keyframes blink { 0%,100% { opacity:0.4; } 50% { opacity:0.9; } }

  /* Zoom controls (scroll / pinch also work) */
  .zoom-ctrl { position:fixed; top:50%; right:16px; transform:translateY(-50%);
    display:flex; flex-direction:column; gap:8px; z-index:10; }
  .zoom-ctrl button { width:38px; height:38px; background:transparent; color:var(--edge);
    border:1px solid var(--edge); font:inherit; font-size:20px; line-height:1; cursor:pointer; }
  .zoom-ctrl button:hover, .zoom-ctrl button:active { background:rgba(78,229,255,0.12); }

  /* Floating machine badges (project 3D position to screen) */
  #badges { position: fixed; inset: 0; pointer-events: none; z-index: 6; }
  .badge {
    position: absolute; transform: translate(-50%, -100%);
    background: rgba(6,10,16,0.92); border: 1px solid currentColor;
    padding: 5px 9px; font-size: 9px; letter-spacing: 0.15em; text-transform: uppercase;
    white-space: nowrap; pointer-events: auto; cursor: pointer; line-height: 1.4;
    transition: background 0.2s, opacity 0.2s;
  }
  .badge:hover { background: rgba(6,10,16,1); transform: translate(-50%, -100%) scale(1.05); }
  .badge-dot { display:inline-block; width:5px; height:5px; border-radius:50%; background:currentColor; margin-right:5px; vertical-align:1px; }
  .badge-id { color:#aac; font-weight:600; }
  .badge-status { font-weight:600; margin-left:6px; }
  /* Compact mode: every machine is a colored box + circle; full label only on click */
  .badge.compact { padding:4px; background:rgba(6,10,16,0.8); }
  .badge.compact .badge-id, .badge.compact .badge-status { display:none; }
  .badge.compact .badge-dot { margin-right:0; width:7px; height:7px; }

  /* Side panel */
  .panel {
    position: fixed; top: 0; right: 0;
    width: min(360px, 88vw); height: 100vh;
    background: rgba(6,10,16,0.96); border-left: 2px solid currentColor;
    padding: 60px 22px 22px; color: var(--hud);
    font-size: 12px; z-index: 20; overflow-y: auto;
    transform: translateX(100%); transition: transform 0.25s;
    backdrop-filter: blur(8px);
  }
  .panel.open { transform: translateX(0); }
  .panel-close {
    position: absolute; top: 14px; right: 14px;
    width: 32px; height: 32px; background: transparent;
    border: 1px solid currentColor; color: currentColor;
    font-size: 18px; cursor: pointer; font-family: inherit;
  }
  .panel-id { color: currentColor; font-size: 11px; letter-spacing: 0.2em; text-transform: uppercase; }
  .panel-label { font-size: 18px; color: #fff; margin-top: 6px; text-transform: uppercase; letter-spacing: 0.08em; }
  .panel-type { font-size: 10px; opacity: 0.5; margin-top: 4px; text-transform: uppercase; letter-spacing: 0.15em; }
  .panel-status { display:flex; align-items:center; gap:8px; padding:10px 0; margin-top:14px;
    border-top:1px solid rgba(78,229,255,0.2); border-bottom:1px solid rgba(78,229,255,0.2);
    font-size:11px; letter-spacing:0.2em; text-transform:uppercase; font-weight:600; }
  .panel-status-dot { width:8px; height:8px; border-radius:50%; background:currentColor; }
  .panel-section { margin-top: 20px; }
  .panel-section-title { font-size: 9px; letter-spacing: 0.25em; opacity: 0.5; margin-bottom: 10px; }
  .panel-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .panel-cell { padding: 10px; border: 1px solid rgba(78,229,255,0.2); }
  .panel-cell-l { font-size: 9px; opacity: 0.5; text-transform: uppercase; letter-spacing: 0.15em; }
  .panel-cell-v { font-size: 18px; color: var(--edge); margin-top: 4px; }
  .panel-ctrls { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .panel-ctrls button {
    background: transparent; border: 1px solid currentColor; color: currentColor;
    padding: 8px 10px; font-size: 10px; letter-spacing: 0.15em; text-transform: uppercase;
    cursor: pointer; font-family: inherit;
  }
  .panel-ctrls button:hover { background: rgba(78,229,255,0.12); }

  /* Status-driven badge alert pulse (error / maintenance) */
  .badge.alert { animation: badgepulse 1s ease-in-out infinite; }
  @keyframes badgepulse { 0%,100%{ box-shadow:0 0 0 0 currentColor; } 50%{ box-shadow:0 0 9px 1px currentColor; } }

  /* Panel: sparkline trend + event log */
  .panel-spark { border:1px solid rgba(78,229,255,0.2); padding:8px; }
  .panel-spark svg { display:block; width:100%; height:44px; }
  .panel-spark-l { display:flex; justify-content:space-between; font-size:9px; opacity:0.5; margin-top:6px; text-transform:uppercase; letter-spacing:0.12em; }
  .panel-log { display:flex; flex-direction:column; gap:6px; }
  .log-row { display:flex; align-items:center; gap:8px; font-size:10px; padding:6px 8px; border-left:2px solid currentColor; background:rgba(255,255,255,0.02); }
  .log-row .t { opacity:0.5; font-variant-numeric:tabular-nums; }
  .log-row .m { color:#cde; text-transform:uppercase; letter-spacing:0.1em; }
  .log-empty { font-size:10px; opacity:0.4; }

  /* Robot-arm panel: health, joints, sensor trends, alarms, prediction */
  .health-row { display:flex; align-items:baseline; gap:14px; }
  .health-num { font-size:42px; line-height:1; font-weight:700; font-variant-numeric:tabular-nums; }
  .health-num span { font-size:13px; opacity:0.5; font-weight:400; }
  .health-meta { font-size:10px; opacity:0.6; text-transform:uppercase; letter-spacing:0.12em; line-height:1.7; }
  .joint-row { display:flex; align-items:center; gap:10px; margin-bottom:7px; font-size:10px; }
  .joint-id { width:22px; color:#cde; font-weight:600; }
  .joint-bar { flex:0 0 54px; height:6px; background:rgba(255,255,255,0.08); position:relative; }
  .joint-bar span { position:absolute; left:0; top:0; bottom:0; }
  .joint-metrics { display:flex; gap:9px; flex-wrap:wrap; font-variant-numeric:tabular-nums; }
  .metric-spark { margin-bottom:10px; }
  .metric-spark svg { display:block; width:100%; height:38px; border:1px solid rgba(78,229,255,0.15); }
  .metric-spark .ms-l { display:flex; justify-content:space-between; font-size:9px; opacity:0.55; text-transform:uppercase; letter-spacing:0.1em; margin-top:3px; }
  .alarm-row { display:flex; gap:8px; font-size:10px; padding:5px 8px; border-left:2px solid currentColor; background:rgba(255,255,255,0.02); margin-bottom:5px; }
  .alarm-row .sev { text-transform:uppercase; font-weight:600; letter-spacing:0.1em; }
  .alarm-row .amsg { color:#cde; }
  .pred-head { font-size:10px; opacity:0.6; text-transform:uppercase; letter-spacing:0.12em; }
  .pred-big { font-size:26px; color:#fff; margin:4px 0; font-variant-numeric:tabular-nums; }
  .pred-big span { font-size:11px; opacity:0.5; }
  .pred-sub { font-size:10px; opacity:0.6; text-transform:uppercase; letter-spacing:0.1em; }
  .pred-bar { height:6px; background:rgba(255,255,255,0.08); margin-top:8px; position:relative; }
  .pred-bar span { position:absolute; left:0; top:0; bottom:0; background:#ffb84e; }
  .diag-text { font-size:11px; line-height:1.5; color:#dfe6ea; white-space:pre-wrap; }
  .diag-meta { font-size:9px; opacity:0.5; margin-top:6px; text-transform:uppercase; letter-spacing:0.12em; }

  /* Hover dashboard (building view) — floats beside the hovered floor */
  #floor-dash {
    position:fixed; z-index:7; pointer-events:none; display:none;
    width:210px; padding:13px 15px; transform:translateY(-50%);
    background:rgba(6,10,16,0.94); border:1px solid var(--edge);
    box-shadow:0 0 18px rgba(78,229,255,0.18);
    font-size:10px; color:var(--hud); letter-spacing:0.08em;
  }
  #floor-dash .fd-name { color:var(--edge); font-size:13px; text-transform:uppercase; letter-spacing:0.16em; }
  #floor-dash .fd-sub { opacity:0.6; margin-top:4px; text-transform:uppercase; letter-spacing:0.12em; }
  #floor-dash .fd-chips { display:flex; flex-wrap:wrap; gap:5px 10px; margin-top:10px; }
  #floor-dash .fd-chip { white-space:nowrap; text-transform:uppercase; }
  #floor-dash .fd-dot { display:inline-block; width:6px; height:6px; border-radius:50%; margin-right:5px; vertical-align:1px; }
  #floor-dash .fd-ttl { font-size:9px; letter-spacing:0.22em; opacity:0.45; margin-top:12px; text-transform:uppercase; }
  #floor-dash .fd-alert { margin-top:4px; text-transform:uppercase; letter-spacing:0.08em; }
  #floor-dash .fd-nominal { opacity:0.45; }

  /* Panel: fault simulation controls (buttons, so per-tick panel re-renders don't break them) */
  .fault-joints { display:flex; gap:5px; margin-bottom:10px; }
  .fault-joints button { flex:1; background:transparent; border:1px solid rgba(78,229,255,0.25);
    color:#8aa3ad; padding:6px 0; font:inherit; font-size:10px; cursor:pointer; }
  .fault-joints button.on { border-color:#4ee5ff; color:#4ee5ff; background:rgba(78,229,255,0.12); }
  .fault-list { display:flex; flex-direction:column; gap:7px; }
  .fbtn { text-align:left; background:transparent; border:1px solid rgba(255,94,94,0.4); color:#ff9b8a;
    padding:9px 11px; font:inherit; font-size:11px; cursor:pointer; letter-spacing:0.04em; }
  .fbtn:hover { background:rgba(255,94,94,0.12); }
  .fbtn-warning { border-color:rgba(255,184,78,0.4); color:#ffc06a; }
  .fbtn-warning:hover { background:rgba(255,184,78,0.12); }
  .fault-active { color:#ff7a6b; font-size:11px; margin-bottom:10px; letter-spacing:0.05em; }
  .panel-ctrls button.fault-clear { border-color:#4ee5ff; color:#4ee5ff; grid-column:1/-1; }

  /* Maintenance Queue — Jira-style board (bottom drawer) */
  .mq-toggle { position:fixed; top:16px; left:50%; transform:translateX(-50%); z-index:24;
    background:rgba(24,104,219,0.16); border:1px solid #1868db; color:#5dade2;
    padding:9px 14px; font:inherit; font-size:10px; letter-spacing:0.18em; text-transform:uppercase; cursor:pointer; }
  .mq-toggle:hover { background:rgba(24,104,219,0.32); }
  .mq-badge { background:#ff5e5e; color:#fff; border-radius:9px; padding:1px 6px; font-size:9px; margin-left:6px; }
  #mqueue { position:fixed; left:0; right:0; bottom:0; z-index:25; height:min(48vh,440px);
    background:rgba(8,12,20,0.975); border-top:2px solid #1868db; transform:translateY(100%);
    transition:transform 0.28s; backdrop-filter:blur(8px); display:flex; flex-direction:column; }
  #mqueue.open { transform:none; }
  .mq-head { display:flex; align-items:center; gap:12px; padding:12px 18px; border-bottom:1px solid #1e3050; }
  .mq-title { color:#4ea1ff; font-size:13px; letter-spacing:0.18em; text-transform:uppercase; }
  .mq-jira { background:#1868db; color:#fff; font-size:9px; padding:2px 7px; border-radius:3px; letter-spacing:0.1em; font-weight:700; }
  .mq-close { width:28px; height:28px; background:transparent; border:1px solid #2a4a6a; color:#7fa0c0; font-size:16px; cursor:pointer; font-family:inherit; }
  .mq-cols { display:flex; gap:14px; padding:14px 18px; overflow:auto; flex:1; }
  .mq-col { flex:1 1 0; min-width:210px; display:flex; flex-direction:column; }
  .mq-col-h { font-size:10px; letter-spacing:0.18em; text-transform:uppercase; color:#8aa0b8;
    margin-bottom:10px; display:flex; justify-content:space-between; border-bottom:1px solid #1e3050; padding-bottom:6px; }
  .mq-card { background:#0e1726; border:1px solid #1e3050; border-left:3px solid #4ea1ff; border-radius:6px;
    padding:11px 12px; margin-bottom:10px; }
  .mq-card.done { opacity:0.55; border-left-color:#3fae6a; }
  .mq-card .k { font-size:10px; color:#5dade2; letter-spacing:0.08em; font-variant-numeric:tabular-nums; }
  .mq-card .s { font-size:12px; color:#dfe6ea; margin:5px 0 8px; line-height:1.35; }
  .mq-card .d { font-size:10px; color:#90a4b8; line-height:1.45; margin:6px 0; max-height:48px; overflow:hidden; }
  .mq-card .det { font-size:10px; color:#aebccf; font-variant-numeric:tabular-nums; margin-bottom:6px; }
  .mq-row { display:flex; align-items:center; gap:6px; flex-wrap:wrap; }
  .mq-pri { font-size:9px; padding:2px 7px; border-radius:3px; text-transform:uppercase; letter-spacing:0.06em; font-weight:700; }
  .mq-pri-Critical { background:#641e16; color:#ff8170; } .mq-pri-High { background:#5c4112; color:#ffb84e; } .mq-pri-Medium { background:#16415f; color:#5dade2; }
  .mq-lbl { font-size:9px; background:#1a2840; color:#8fa6c4; padding:2px 6px; border-radius:3px; }
  .mq-meta { font-size:9px; color:#5e7693; margin-top:8px; letter-spacing:0.04em; }
  .mq-empty { font-size:10px; color:#465a72; padding:10px 0; }
  .mq-card { cursor:pointer; transition:border-color 0.15s; }
  .mq-card:hover { border-color:#4ea1ff; }

  /* Top-left fault control: a collapsible "Fault Simulation" button + body (floor view) */
  #fault-ctrl { position:fixed; top:128px; left:16px; width:230px; z-index:11; display:none; }
  .fc-toggle { width:100%; display:flex; align-items:center; gap:6px; background:rgba(255,94,94,0.14);
    border:1px solid rgba(255,94,94,0.5); color:#ff9b8a; padding:9px 12px; font:inherit; font-size:10px;
    letter-spacing:0.16em; text-transform:uppercase; cursor:pointer; text-align:left; }
  .fc-toggle:hover { background:rgba(255,94,94,0.24); }
  .fc-toggle.open { border-bottom-color:transparent; }
  .fc-caret { margin-left:auto; }
  .fc-count { background:#ff5e5e; color:#fff; border-radius:8px; padding:0 6px; font-size:9px; }
  .fc-body { background:rgba(6,10,16,0.94); border:1px solid rgba(255,94,94,0.5); border-top:none; padding:12px 13px; }
  #fault-ctrl .fc-l { font-size:9px; letter-spacing:0.14em; text-transform:uppercase; color:#6f8794; margin:4px 0 6px; }
  #fault-ctrl .fault-targets { display:flex; gap:5px; margin-bottom:10px; flex-wrap:wrap; }
  #fault-ctrl .ftgt { flex:1 1 60px; background:transparent; border:1px solid rgba(78,229,255,0.25);
    color:#8aa3ad; padding:6px 4px; font:inherit; font-size:9px; cursor:pointer; white-space:nowrap; }
  #fault-ctrl .ftgt.on { border-color:#4ee5ff; color:#4ee5ff; background:rgba(78,229,255,0.12); }
  #fault-ctrl .fault-clear { width:100%; background:transparent; border:1px solid #4ee5ff; color:#4ee5ff;
    padding:8px 10px; font:inherit; font-size:10px; letter-spacing:0.15em; text-transform:uppercase; cursor:pointer; }
  #fault-ctrl .fault-clear:hover { background:rgba(78,229,255,0.12); }

  /* Ticket detail modal */
  #mq-modal { position:fixed; inset:0; z-index:30; display:none; align-items:center; justify-content:center;
    background:rgba(2,5,10,0.62); backdrop-filter:blur(3px); }
  #mq-modal.open { display:flex; }
  .mqm-card { width:min(560px,92vw); max-height:86vh; overflow:auto; background:#0c1422;
    border:1px solid #1e3050; border-top:3px solid #1868db; border-radius:8px; padding:22px 24px; }
  .mqm-top { display:flex; align-items:center; gap:10px; }
  .mqm-key { color:#5dade2; font-size:12px; letter-spacing:0.08em; font-variant-numeric:tabular-nums; }
  .mqm-close { margin-left:auto; width:30px; height:30px; background:transparent; border:1px solid #2a4a6a; color:#7fa0c0; font-size:16px; cursor:pointer; font-family:inherit; }
  .mqm-summary { color:#fff; font-size:17px; margin:13px 0 5px; line-height:1.3; }
  .mqm-status { font-size:10px; letter-spacing:0.1em; text-transform:uppercase; color:#8aa0b8; }
  .mqm-sec { font-size:9px; letter-spacing:0.22em; text-transform:uppercase; color:#5e7693; margin:18px 0 8px; }
  .mqm-desc { font-size:12px; color:#cdd8e2; line-height:1.6; white-space:pre-wrap; }
  .mqm-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
  .mqm-f { border:1px solid #1a2840; border-radius:5px; padding:9px 11px; }
  .mqm-f .l { font-size:9px; text-transform:uppercase; letter-spacing:0.12em; color:#5e7693; }
  .mqm-f .v { font-size:13px; color:#dfe6ea; margin-top:3px; font-variant-numeric:tabular-nums; }
  .mqm-actions { margin-top:18px; display:flex; gap:10px; }
  .mqm-actions button { background:transparent; border:1px solid currentColor; padding:9px 14px;
    font:inherit; font-size:11px; letter-spacing:0.1em; text-transform:uppercase; cursor:pointer; }
  .mqm-resolve { color:#3fae6a; } .mqm-resolve:hover { background:rgba(63,174,106,0.12); }

  /* AI diagnosis (parsed render — diag2-*) */
  .diag2-empty { font-size:12px; color:var(--hud); padding:8px 0; }
  .diag2-titlerow { display:flex; align-items:center; justify-content:space-between; gap:10px; margin-bottom:10px; }
  .diag2-titlerow--ticket { justify-content:flex-start; }
  .diag2-title { font-size:13px; font-weight:700; color:#fff; line-height:1.3; }
  .diag2-badge { flex:0 0 auto; font-size:10px; font-weight:700; letter-spacing:0.08em; text-transform:uppercase;
    padding:2px 8px; border:1px solid currentColor; border-radius:3px; background:rgba(6,10,16,0.5); white-space:nowrap; }
  .diag2-evidence { display:flex; flex-direction:column; gap:5px; margin-bottom:10px; }
  .diag2-ev { display:flex; align-items:flex-start; gap:7px; font-size:11.5px; color:#c9d6db; line-height:1.4; }
  .diag2-check { flex:0 0 auto; color:#2ecc71; font-weight:700; }
  .diag2-root { font-size:11px; color:var(--hud); line-height:1.45; margin:0 0 10px; }
  .diag2-action { font-size:12px; color:#e6f6fa; line-height:1.45; padding:8px 10px 8px 11px; margin-bottom:8px;
    border-left:3px solid var(--edge); background:rgba(78,229,255,0.07); border-radius:0 3px 3px 0; }
  .diag2-action-tag { display:block; font-size:9px; font-weight:700; letter-spacing:0.12em; text-transform:uppercase; color:var(--edge); margin-bottom:4px; }
  .diag2-parts, .diag2-cost { font-size:11px; line-height:1.5; margin-top:4px; }
  .diag2-parts { color:#c9d6db; }
  .diag2-cost { color:var(--maint); }
  .diag2-k { font-weight:700; letter-spacing:0.08em; text-transform:uppercase; }
</style>
</head>
<body>
<div class="corner c1"></div><div class="corner c2"></div><div class="corner c3"></div><div class="corner c4"></div>
<div class="scan"></div>
<img class="brand-logo" id="brandLogo" src="./robo-flow-logo.png" alt="Robo-Flow" />

// its threshold, so the existing alarm/scoring logic fires automatically. Diagnosis text
// and ticket priority are grounded in real robot failure modes. `also` ramps a second
// metric in tandem; `jitter` adds instability (used for the anomaly fault).

// Rich AI-style diagnoses (same Markdown format the live Qwen backend emits) so the mock
// demo renders identically to live. parseDiagnosis() turns these into structured sections.
const FAULT_DIAGNOSES = {
  bearing_overtemp: `## Diagnosis: BEARING_OVERTEMP

**Confidence:** High (4/5 sensors confirm)

**Evidence:**
- **Temperature:** 86.4°C — exceeds critical threshold (80°C) by 8%; sustained climb over the last window indicates frictional heat, not ambient.
- **Current:** 7.8 A — above warning (7 A); motor draws extra power to overcome increased rolling resistance.
- **Torque:** 112 Nm — above warning (100 Nm); bearing drag adds parasitic load through the joint.
- **Vibration:** 4.6 mm/s — past warning (4 mm/s); early spalling signature on the race.
- **Position:** nominal — no tracking error yet, isolating fault to the bearing rather than the encoder.

**Root Cause:**
Lubricant breakdown in the joint harmonic-drive output bearing. Grease starvation raises metal-to-metal friction, which compounds heat and load in a runaway loop. Left unchecked the race will gall and seize.

**Action:**
Stop the robot and allow the joint to cool. Re-lubricate or replace the bearing within **48 hours**. Do not resume production-rate cycles until temperature holds below 65°C.

**Parts (if applicable):**
Harmonic Drive Output Bearing, CSF-25-XRB (Vendor Part No. URC-HD25-2A).

**Cost of Inaction:**
Bearing seizure will cause an unplanned joint lockup and an estimated **6 hours** of **downtime** per arm, with secondary gear damage likely within **5–7 days**.`,

  collision_overcurrent: `## Diagnosis: COLLISION_OVERCURRENT

**Confidence:** High (5/5 sensors confirm)

**Evidence:**
- **Current:** 9.6 A — above critical (9 A); near-instantaneous spike consistent with a hard mechanical stop.
- **Torque:** 138 Nm — above critical (130 Nm); reaction torque from impact transmitted through the joint.
- **Vibration:** 6.8 mm/s — approaching critical (7 mm/s); shock transient at the moment of contact.
- **Temperature:** 71°C — past warning (65°C); brief I²R heating from the current surge.
- **Velocity/Position:** abrupt deviation from commanded path — the arm stalled against an obstruction.

**Root Cause:**
A collision event: the arm struck a fixture or workpiece outside its planned trajectory. The servo drove peak current and torque attempting to hold the commanded position against the obstruction, tripping protective limits.

**Action:**
E-stop immediately and clear the work envelope. Inspect for tool, fixture, and gear damage before re-enabling. Re-home and re-verify the program within **4 hours**; do not auto-restart.

**Parts (if applicable):**
Strain-Wave Gear Set, KR16-SW100 (Vendor Part No. KUK-SWG2-016) — replace only if backlash check fails.

**Cost of Inaction:**
Repeated overcurrent trips degrade the gearset and drive electronics, risking catastrophic gear failure with **8 hours** of **downtime** and possible scrapped parts within the same shift.`,

  mechanical_wear: `## Diagnosis: MECHANICAL_WEAR

**Confidence:** Medium (2/5 sensors confirm)

**Evidence:**
- **Vibration:** 6.2 mm/s — above warning (4 mm/s), below critical (7 mm/s); rising broadband signature typical of gear-tooth and bearing wear.
- **Torque:** 104 Nm — just past warning (100 Nm); growing mechanical resistance as clearances open up.
- **Temperature:** 58°C — within normal range; no thermal runaway, so the fault is mechanical not lubrication-driven.
- **Current:** 6.4 A — nominal; load increase is marginal at this stage.
- **Position:** within tolerance — tracking still good, indicating early-stage wear.

**Root Cause:**
Progressive wear in the joint reducer: increasing backlash and surface fatigue on the gear teeth raise vibration and effective load. The trend is gradual, consistent with normal end-of-life degradation rather than an acute fault.

**Action:**
Schedule a planned reducer inspection and lubrication analysis. Replace the gear unit at the next maintenance window, within **3 weeks**, before vibration reaches the critical threshold.

**Parts (if applicable):**
RV Reducer, RV-40E (Vendor Part No. ABB-RV40-6700).

**Cost of Inaction:**
Continued operation accelerates wear toward critical vibration, risking positional drift and an eventual unplanned stop of roughly **4 hours** **downtime** within **3–4 weeks**.`,

  erratic_motion: `## Diagnosis: ENCODER_ANOMALY

**Confidence:** Medium (3/5 sensors confirm)

**Evidence:**
- **Vibration:** 5.4 mm/s — above warning (4 mm/s); irregular, non-periodic pattern atypical of steady gear wear.
- **Position:** intermittent tracking error — micro-jumps and overshoot suggest corrupted feedback rather than a mechanical bind.
- **Velocity:** unstable — servo hunts and over-corrects, the hallmark of noisy or dropping encoder counts.
- **Current:** 6.8 A — near warning (7 A); fluctuating draw as the loop fights to settle.
- **Temperature:** 54°C — normal; rules out thermal or bearing-friction causes.

**Root Cause:**
Suspected encoder fault: intermittent signal dropout or electrical noise feeds bad position data to the servo loop, producing erratic motion and positional instability. A loose connector, degraded shielding, or a failing encoder disk is the likely source.

**Action:**
Inspect and reseat the encoder cable and shielding; run an encoder self-test. If errors persist, replace the encoder within **7 days** and keep the robot at reduced speed until resolved.

**Parts (if applicable):**
Absolute Multi-Turn Encoder, AME-17/4096 (Vendor Part No. URC-ENC1-17B).

**Cost of Inaction:**
Encoder failure mid-cycle causes a protective fault stop and loss of calibration, with about **5 hours** of **downtime** for re-homing and re-mastering, likely within **1–2 weeks**.`
};

// =============================================================================
//   SECTION 3 — STATE
//   Lightweight pub/sub. The simulator and UI both call updateTelemetry().
//   Subscribers get notified (used to refresh badges + panel).
// =============================================================================

const state = {
  selectedId: null,
  currentView: 'building',
  telemetry: {},   // machineId -> { status, utilization, partsProcessed, temperature, rpm, lastMaintenance, alarms }
  history: {},     // machineId -> [{ u, temp }]  ring buffer feeding the panel sparkline
  events: [],      // [{ id, from, to, t }]  global status-change log, newest first
  tickets: [],     // [{ key, machineId, status, ... }]  Jira-style maintenance queue
  listeners: new Set()
};

const HISTORY_LEN = 48;  // samples kept per machine for the trend sparkline

function subscribe(fn) { state.listeners.add(fn); return () => state.listeners.delete(fn); }
function emit() { state.listeners.forEach(fn => fn(state)); }
function setSelected(id) { state.selectedId = id; emit(); }
function fmtTime(ts) { return new Date(ts).toTimeString().slice(0, 8); }
function logEvent(id, from, to) {
  state.events.unshift({ id, from, to, t: Date.now() });
  if (state.events.length > 60) state.events.pop();
}
function jointMax(joints, metric) {
  let m = 0; for (const k in joints) m = Math.max(m, joints[k][metric] || 0); return m;
}
function updateTelemetry(id, patch) {
  const prev = state.telemetry[id] || {};
  const next = { ...prev, ...patch };
  state.telemetry[id] = next;
  // Record a history sample (richer for robot arms — feeds the panel sparklines)
  const h = state.history[id] || (state.history[id] = []);
  h.push(next.joints
    ? { health: next.health_score || 0, temperature: jointMax(next.joints, 'temperature'),
        torque: jointMax(next.joints, 'torque'), vibration: jointMax(next.joints, 'vibration'),
        current: jointMax(next.joints, 'current') }
    : { u: next.utilization || 0, temp: next.temperature || 0 });
  if (h.length > HISTORY_LEN) h.shift();
  // Log status transitions as events (drives the panel event log)
  if (patch.status && patch.status !== prev.status) logEvent(id, prev.status, patch.status);
  emit();
}

// Mock-only behavior profiles, kept OUT of telemetry so telemetry matches the

    const joints = {};

      joint_id: j, position: 0, velocity: 0, torque: 30,
      temperature: 42, current: 3, vibration: 1.5, error_code: 0, score: 100
    };
    state.telemetry[m.id] = {
      robot_id: m.id, vendor: p.vendor, model: p.model, status: 'running',
      safety_state: 'normal', health_score: 100, joints, alarms: [], prediction: null,
      lastMaintenance: '2025-03-14'
    };
  } else {
    state.telemetry[m.id] = {
      status: 'running', utilization: 0.7, partsProcessed: Math.floor(Math.random() * 5000),
      temperature: 35 + Math.random() * 10, rpm: 1100 + Math.random() * 300,
      health_score: 100, lastMaintenance: '2025-03-14', alarms: []
    };
  }
  state.history[m.id] = [];
}));

const lm = (c, o = 0.9) => new THREE.LineBasicMaterial({ color: c, transparent: true, opacity: o });
const mkBox = (w, h, d, m) => new THREE.LineSegments(new THREE.EdgesGeometry(new THREE.BoxGeometry(w, h, d)), m);
const mkCyl = (r, h, s, m) => new THREE.LineSegments(new THREE.EdgesGeometry(new THREE.CylinderGeometry(r, r, h, s), 1), m);

// Shared materials
const M = {
  edge: lm(0x4ee5ff, 0.9), dim: lm(0x1f6478, 0.55),
  bstruct: lm(0x4ee5ff, 0.8),   // building scaffold — brighter than dim so the homepage reads crisp, not grey
  f1: lm(0xa8ff5e), f2: lm(0x5ec8ff), f3: lm(0xffb84e), f4: lm(0xff5ec8),
  f1d: lm(0xa8ff5e, 0.4), f2d: lm(0x5ec8ff, 0.4), f3d: lm(0xffb84e, 0.4), f4d: lm(0xff5ec8, 0.4),
  bot: lm(0xffb84e), part: lm(0xff5ec8), spark: lm(0xfff5a8),
  bottle: lm(0xa8e5ff, 0.95), liquid: lm(0x5ec8ff), cap: lm(0xff9d4e), car: lm(0x5ec8ff),
  pkgA: lm(0x5ec8ff), pkgB: lm(0xff5ec8), pkgC: lm(0xa8ff5e), pkgU: lm(0xffb84e)
};

/**
 * Apply wireframe edges to every mesh inside a loaded model.
 * Use this on GLB-loaded geometry to keep the stylized look.
 */
function applyWireframeOverlay(obj, color = 0x4ee5ff) {
  const mat = lm(color, 0.9);
  obj.traverse(c => {
    if (c.isMesh) {
      const edges = new THREE.EdgesGeometry(c.geometry, 15);
      const line = new THREE.LineSegments(edges, mat);
      c.add(line);
      c.material.transparent = true;
      c.material.opacity = 0;  // hide the filled mesh, keep just edges
    }
  });
}

// =============================================================================
//   SECTION 6 — MACHINE FACTORIES
//   One function per machine type. Each takes a machine data object and
//   returns a THREE.Group (with userData.machineId set).
//   To add a new machine type:
//     1. Write a `makeMyType(machine)` function here
//     2. Register it in MACHINE_FACTORIES below
//     3. Use type:'my_type' in LAYOUT
// =============================================================================

function tagMachine(group, machine) {
  group.userData.machineId = machine.id;
  group.userData.label = machine.label;
  group.userData.type = machine.type;
  return group;
}

function makeConveyorLine(m) {
  const g = new THREE.Group();
  const [x1, z1] = m.from, [x2, z2] = m.to, w = m.width || 1.4;
  const dx = x2 - x1, dz = z2 - z1, len = Math.sqrt(dx*dx + dz*dz);
  const cx = (x1+x2)/2, cz = (z1+z2)/2, a = Math.atan2(dz, dx);
  // Belt deck
  const belt = mkBox(len, 0.2, w, M.edge); belt.position.set(cx, 0.6, cz); belt.rotation.y = -a; g.add(belt);
  // Side rails
  const offX = -Math.sin(a) * (w/2 + 0.05), offZ = Math.cos(a) * (w/2 + 0.05);
  const rA = mkBox(len, 0.35, 0.08, M.edge); rA.position.set(cx+offX, 0.85, cz+offZ); rA.rotation.y = -a; g.add(rA);
  const rB = mkBox(len, 0.35, 0.08, M.edge); rB.position.set(cx-offX, 0.85, cz-offZ); rB.rotation.y = -a; g.add(rB);
  // Legs
  const n = Math.max(3, Math.floor(len / 4));
  for (let i = 0; i < n; i++) {
    const f = i / Math.max(1, n - 1);
    const leg = mkBox(0.25, 0.55, 0.25, M.dim);
    leg.position.set(x1 + dx*f, 0.275, z1 + dz*f); g.add(leg);
  }
  return tagMachine(g, m);
}

function makeSortBin(m) {
  const g = new THREE.Group();
  const outer = mkBox(3, 1.6, 3, lm(m.color || 0x4ee5ff));
  outer.position.set(...m.position).add(new THREE.Vector3(0, 0.8, 0));
  g.add(outer);
  const inner = mkBox(2.5, 1.3, 2.5, M.dim);
  inner.position.set(...m.position).add(new THREE.Vector3(0, 0.85, 0));
  g.add(inner);
  return tagMachine(g, m);
}

function makeOutputBin(m) {
  const g = new THREE.Group();
  const b = mkBox(2.5, 1.5, 1.5, M.dim);
  b.position.set(m.position[0], m.position[1] + 0.75, m.position[2]);
  g.add(b);
  return tagMachine(g, m);
}

function makeFiller(m) {
  const g = new THREE.Group();
  const n = mkBox(0.35, 1.2, 0.35, M.liquid);

function makeCapper(m) {

function makeAssemblyTrack(m) {
  const g = new THREE.Group();
  const [x1, z1] = m.from, [x2, z2] = m.to;
  const len = Math.abs(x2 - x1);
  const cx = (x1+x2)/2, w = m.width || 3.2;
  const track = mkBox(len, 0.2, w, M.edge); track.position.set(cx, 0.5, 0); g.add(track);
  // Gantry rails
  const r1 = mkBox(len, 0.2, 0.3, M.dim); r1.position.set(cx, 7, w/2 + 0.5); g.add(r1);
  const r2 = mkBox(len, 0.2, 0.3, M.dim); r2.position.set(cx, 7, -(w/2 + 0.5)); g.add(r2);
  // Columns
  [-22, -8, 8, 22].forEach(x => {
    const c1 = mkBox(0.3, 7, 0.3, M.dim); c1.position.set(x, 3.5, w/2 + 0.5); g.add(c1);
    const c2 = mkBox(0.3, 7, 0.3, M.dim); c2.position.set(x, 3.5, -(w/2 + 0.5)); g.add(c2);
  });
  return tagMachine(g, m);
}

/**

 */
function makeRobotArm(m) {

function makeWeldingArm(m) {

const MACHINE_FACTORIES = {

// =============================================================================
//   SECTION 7 — SCENE BUILDERS
//   Reads LAYOUT and instantiates machines via the factory registry.
//   Each floor is a THREE.Group with `visible` toggled when switching views.
// =============================================================================

const groups = {};
const machineObjects = {};  // machineId -> THREE.Group (for raycasting + animation)
const animators = {};       // viewId -> function (per-floor animation loop)
const refs = {};            // per-floor animation refs (flow particles etc.)
const clickTargets = [];    // building-view floor click targets
const buildingHighlights = {};  // floorId -> translucent glow box faded in on hover

/** Build a floor scene from its layout data + visual flows. */
function buildFloorScene(floorData) {
  const g = new THREE.Group(); g.visible = false;

  // Floor grid
  const grid = new THREE.GridHelper(50, 25, 0x1f6478, 0x0e2e3a);
  grid.material.transparent = true; grid.material.opacity = 0.5;
  g.add(grid);

  // Instantiate machines from data
  floorData.machines.forEach(m => {
    const factory = MACHINE_FACTORIES[m.type];
    if (!factory) { console.warn('No factory for', m.type); return; }
    const obj = factory(m);
    g.add(obj);
    machineObjects[m.id] = obj;
  });

  // Add flow particles per floor (animated items that aren't equipment)
  refs[floorData.id] = setupFlows(g, floorData);

  groups[floorData.id] = g;
  scene.add(g);
  animators[floorData.id] = (t) => animateFloor(floorData, t);
}

/** Set up animated flow particles (parts, packages, bottles, cars). */
function setupFlows(g, floorData) {
  const r = { flows: [] };
  (floorData.flows || []).forEach(flow => {
    if (flow.type === 'parts_on_conveyor') {
      const parts = [];
      for (let i = 0; i < flow.count; i++) {
        const p = mkBox(0.9, 0.9, 0.9, M.part); p.position.y = 1.65;
        parts.push(p); g.add(p);
      }
      r.flows.push({ kind: 'parts', items: parts });
    } else if (flow.type === 'bottles_on_lanes') {
      const bottles = [];
      flow.lanes.forEach((z, li) => {
        for (let i = 0; i < flow.perLane; i++) {
          const bot = new THREE.Group();
          const body = mkCyl(0.32, 1.2, 10, M.bottle); body.position.y = 0.6; bot.add(body);
          const neck = mkCyl(0.15, 0.3, 8, M.bottle); neck.position.y = 1.35; bot.add(neck);
          const cap = mkCyl(0.18, 0.18, 8, M.cap); cap.position.y = 1.6; cap.visible = false; bot.add(cap);
          bot.position.set(0, 0.7, z); g.add(bot);
          bottles.push({ mesh: bot, cap, off: (i/flow.perLane) * 32, hasCap: false, laneIdx: li });
        }
      });
      r.flows.push({ kind: 'bottles', items: bottles });
    } else if (flow.type === 'car_bodies_on_track') {
      const cars = [];
      for (let i = 0; i < flow.count; i++) {
        const c = new THREE.Group();
        const body = mkBox(4.5, 0.7, 1.7, M.car); body.position.y = 0.95; c.add(body);
        const cabin = mkBox(2.3, 0.7, 1.5, M.car); cabin.position.set(-0.2, 1.65, 0); c.add(cabin);
        const hood = mkBox(1.2, 0.15, 1.5, M.car); hood.position.set(1.5, 1.35, 0); c.add(hood);
        [-1.5, 1.5].forEach(wx => [-0.85, 0.85].forEach(wz => {
          const w = mkCyl(0.35, 0.25, 10, M.dim); w.rotation.x = Math.PI/2; w.position.set(wx, 0.65, wz); c.add(w);
        }));
        cars.push(c); g.add(c);
      }
      r.flows.push({ kind: 'cars', items: cars });
    } else if (flow.type === 'sort_packages') {
      const pkgs = [];
      const branches = [
        { end: [14, -10], mat: M.pkgA },
        { end: [18, 0],   mat: M.pkgB },
        { end: [14, 10],  mat: M.pkgC }
      ];
      for (let i = 0; i < flow.count; i++) {
        const p = mkBox(0.7, 0.7, 0.7, M.pkgU); g.add(p);
        pkgs.push({ mesh: p, t: i/flow.count, branchIdx: -1 });
      }
      r.flows.push({ kind: 'packages', items: pkgs, branches });
    }
  });
  return r;
}

/** Per-frame animation for a floor. Reads state.telemetry to drive arms. */
function animateFloor(floorData, t) {
  const r = refs[floorData.id];

  // Animate machines based on their status
  floorData.machines.forEach(m => {
    const obj = machineObjects[m.id];
    if (!obj || !obj.userData.animRefs) return;
    const tel = state.telemetry[m.id];
    const status = tel && tel.status;
    const a = obj.userData.animRefs;

    if (status === 'running' || status === 'maintenance') {
      const speed = status === 'running' ? 1.4 : 0.5;
      const ph = t * speed + (m.id.charCodeAt(m.id.length - 1) * 0.1);
      if (a.kind === 'pick') {
        a.sh.rotation.y = Math.sin(ph * 0.7) * 0.35;
        a.el.rotation.x = 0.55 + Math.sin(ph) * 0.45;
        a.wr.rotation.x = -0.3 + Math.sin(ph * 1.6) * 0.25;
      } else if (a.kind === 'weld') {
        a.sh.rotation.y = Math.sin(ph * 0.8) * 0.3;
        a.el.rotation.x = 0.6 + Math.sin(ph * 1.2) * 0.5;
        a.wr.rotation.x = Math.sin(ph * 2) * 0.4;
        a.spark.material.opacity = (status === 'running' && Math.sin(ph * 8) > 0.4) ? 1 : 0;
      }
    } else {
      // Ease to rest
      if (a.kind === 'pick') {
        a.sh.rotation.y *= 0.92; a.el.rotation.x = a.el.rotation.x * 0.92 + 0.05; a.wr.rotation.x *= 0.92;
      } else if (a.kind === 'weld') {
        a.sh.rotation.y *= 0.92; a.el.rotation.x *= 0.92; a.wr.rotation.x *= 0.92;
        a.spark.material.opacity = 0;
      }
    }
  });

  // Animate flow particles
  if (!r) return;
  r.flows.forEach(flow => {
    if (flow.kind === 'parts') {
      flow.items.forEach((p, i) => {
        p.position.x = (((t * 2.2 + i * 8) % 40) + 40) % 40 - 20;
      });
    } else if (flow.kind === 'bottles') {
      flow.items.forEach(b => {
        const prev = b.mesh.position.x;
        b.mesh.position.x = (((t * 2 + b.off) % 32) + 32) % 32 - 16;
        if (b.mesh.position.x > 4.5 && !b.hasCap) { b.cap.visible = true; b.hasCap = true; }
        if (prev > 0 && b.mesh.position.x < -10) { b.cap.visible = false; b.hasCap = false; }
      });
      // Bob fillers + capper rotation (using state.telemetry to gate)
      ['FILL-1','FILL-2','FILL-3','FILL-4'].forEach((id, i) => {
        const obj = machineObjects[id]; if (!obj || !obj.userData.animTarget) return;
        const tel = state.telemetry[id];
        if (tel && tel.status === 'running') {
          obj.userData.animTarget.position.y = 3.8 - Math.max(0, Math.sin(t*2.2 + i*0.4)) * 0.6;
        }
      });
      ['CAP-1','CAP-2','CAP-3','CAP-4'].forEach((id, i) => {
        const obj = machineObjects[id]; if (!obj || !obj.userData.animTarget) return;
        const tel = state.telemetry[id];
        if (tel && tel.status === 'running') {
          obj.userData.animTarget.position.y = 3.9 - Math.max(0, Math.sin(t*2.2 + i*0.4 + 0.6)) * 0.5;
          obj.userData.animTarget.rotation.y = t * 8;
        }
      });
    } else if (flow.kind === 'cars') {
      flow.items.forEach((c, i) => {
        c.position.x = (((t * 1.5 + i * 12.5) % 50) + 50) % 50 - 25;
        c.position.y = 0.05;
      });
    } else if (flow.kind === 'packages') {
      flow.items.forEach(p => {
        const lt = ((t * 0.08 + p.t) % 1 + 1) % 1;
        if (lt < 0.5) {
          const s = lt / 0.5;
          p.mesh.position.set(-20 + s * 20, 1.05, 0);
          p.mesh.material = M.pkgU;
          if (s > 0.95 && p.branchIdx < 0) p.branchIdx = Math.floor(Math.random() * 3);
        } else {
          if (p.branchIdx < 0) p.branchIdx = Math.floor(Math.random() * 3);
          const br = flow.branches[p.branchIdx];
          const s = (lt - 0.5) / 0.5;
          p.mesh.position.set(br.end[0] * s, 1.05, br.end[1] * s);
          p.mesh.material = br.mat;
        }
        if (lt < 0.1) p.branchIdx = -1;
      });
    }
  });
}

// Build all floor scenes from LAYOUT
LAYOUT.floors.forEach(buildFloorScene);

// ---- Status-driven wire color --------------------------------------------
// Machines share materials by default. Clone each machine's materials so a
// status change recolors ONLY that machine, then map status -> color so the
// floor reads as a live health map (cyan=running, grey=idle, amber=maint,
// red=error, dark=offline). Flow particles (packages/bottles/cars) keep their
// own decorative colors — they're product, not equipment.
function initMachineMaterials() {
  Object.values(machineObjects).forEach(obj => {
    const mats = [];
    obj.traverse(c => {
      if (c.isLineSegments) { c.material = c.material.clone(); mats.push(c.material); }
    });
    obj.userData.statusMats = mats;
  });
}
function updateMachineColors() {
  // Color ALL floors (not just the current one) so the scaled miniatures in the
  // building view — which share materials with the originals — stay live too.
  LAYOUT.floors.forEach(floor => floor.machines.forEach(m => {
    const obj = machineObjects[m.id], tel = state.telemetry[m.id];
    if (!obj || !obj.userData.statusMats || !tel) return;
    const col = STATUS_COLORS[tel.status] || '#4ee5ff';
    const sel = state.selectedId === m.id;
    obj.userData.statusMats.forEach(mat => {
      mat.color.set(col);
      mat.opacity = tel.status === 'offline' ? 0.25 : (sel ? 1 : 0.9);
    });
  }));
}
initMachineMaterials();

// ---- Invisible click hitboxes --------------------------------------------
// Raycasting thin wireframe lines is fragile — it needs pixel-perfect aim and
// gets much worse as you zoom out. Instead, wrap each machine in an invisible
// solid box sized to its bounds, and raycast against those. Robust at any zoom.
const machineHitboxes = {};   // machineId -> invisible Mesh
function buildHitboxes() {
  scene.updateMatrixWorld(true);   // ensure machine world transforms are current
  const box = new THREE.Box3(), size = new THREE.Vector3(), center = new THREE.Vector3();
  LAYOUT.floors.forEach(floor => {
    floor.machines.forEach(m => {
      const obj = machineObjects[m.id]; if (!obj) return;
      box.setFromObject(obj);
      if (box.isEmpty()) return;
      box.getSize(size); box.getCenter(center);
      const hit = new THREE.Mesh(
        new THREE.BoxGeometry(size.x + 0.4, size.y + 0.4, size.z + 0.4),
        // DoubleSide so the ray still hits when the camera is zoomed inside the box
        new THREE.MeshBasicMaterial({ visible: false, side: THREE.DoubleSide })
      );
      hit.position.copy(center);          // floor groups have no transform, so world == local
      hit.userData.machineId = m.id;
      groups[floor.id].add(hit);          // toggles visibility with the floor
      machineHitboxes[m.id] = hit;
    });
  });
}
buildHitboxes();

// =============================================================================
//   SECTION 8 — BUILDING (section view)
//   The lobby + 4 stacked factory floors with stair tower, viewable as an
//   architectural cross-section. Visual-only — does not read LAYOUT.machines.
//   (You can data-drive this later if you want; for now it's hand-composed.)
// =============================================================================

function buildBuilding() {
  const g = new THREE.Group();
  const FW = 28, FD = 12, LH = 3, FH = 5, BH = LH + FH * 4;
  const STAIR_X = FW/2 - 3;
  const F = [
    { yB: 0,          h: LH, id: null,     col: M.edge },
    { yB: LH,         h: FH, id: 'floor1', col: M.f1   },
    { yB: LH + FH,    h: FH, id: 'floor2', col: M.f2   },
    { yB: LH + FH*2,  h: FH, id: 'floor3', col: M.f3   },
    { yB: LH + FH*3,  h: FH, id: 'floor4', col: M.f4   }
  ];

  // Slabs
  F.forEach(fd => {
    const slab = mkBox(FW, 0.18, FD, M.edge); slab.position.y = fd.yB; g.add(slab);
  });
  const roof = mkBox(FW + 0.4, 0.25, FD + 0.4, M.edge); roof.position.y = BH; g.add(roof);

  // Corner columns + interior columns
  [[-1,-1],[1,-1],[-1,1],[1,1]].forEach(([sx, sz]) => {
    const col = mkBox(0.5, BH, 0.5, M.edge);
    col.position.set(sx * FW/2, BH/2, sz * FD/2); g.add(col);
  });
  [-FW/4, 0, FW/4].forEach(x => {
    const col = mkBox(0.35, BH, 0.35, M.dim); col.position.set(x, BH/2, 0); g.add(col);
  });

  // Facade window mullions per floor
  F.forEach(fd => {
    const yT = fd.yB + fd.h - 0.4, yBb = fd.yB + 0.4;
    const verts = [], mat = fd.id ? fd.col : M.dim;
    [-FD/2, FD/2].forEach(z => {
      verts.push(-FW/2, yT, z, FW/2, yT, z); verts.push(-FW/2, yBb, z, FW/2, yBb, z);
    });
    for (let x = -FW/2 + 2; x < FW/2; x += 2) verts.push(x, yBb, -FD/2, x, yT, -FD/2);
    for (let z = -FD/2 + 2; z < FD/2; z += 2) {
      verts.push(-FW/2, yBb, z, -FW/2, yT, z); verts.push(FW/2, yBb, z, FW/2, yT, z);
    }
    const geom = new THREE.BufferGeometry();
    geom.setAttribute('position', new THREE.Float32BufferAttribute(verts, 3));
    g.add(new THREE.LineSegments(geom, mat));
  });

  // Stair tower
  const stairOutline = mkBox(2.6, BH, 2.6, M.dim); stairOutline.position.set(STAIR_X, BH/2, 0); g.add(stairOutline);
  for (let i = 1; i < F.length; i++) {
    const yLow = F[i-1].yB + 0.3, yHigh = F[i].yB - 0.1;
    const dy = yHigh - yLow, len = Math.sqrt(4 + dy*dy), ang = Math.atan2(dy, 2);
    const dir = i % 2 === 0 ? 1 : -1;
    const stair = mkBox(len, 0.15, 1.1, M.edge);
    stair.position.set(STAIR_X + dir * 0.6, (yLow+yHigh)/2, 0);
    stair.rotation.z = -dir * ang; g.add(stair);
  }

  // Lobby content + roof equipment + trees + plinth + grid (visual decoration)
  const desk = mkBox(3.5, 1, 1.2, M.edge); desk.position.set(-9, 0.5, 2); g.add(desk);
  const overhang = mkBox(7, 0.2, 2.2, M.edge); overhang.position.set(-4, LH - 0.1, -FD/2 - 1.1); g.add(overhang);
  const door = mkBox(2.4, LH - 0.6, 0.1, M.edge); door.position.set(-4, (LH - 0.6)/2, -FD/2); g.add(door);
  const fl = new THREE.Group();
  const flBody = mkBox(1.5, 0.7, 0.9, M.edge); flBody.position.y = 0.35; fl.add(flBody);
  const flMast = mkBox(0.15, 1.3, 0.15, M.edge); flMast.position.set(0.6, 1, 0); fl.add(flMast);
  fl.position.set(6, 0.1, 3); g.add(fl);
  const hvac = mkBox(5, 1.4, 3, M.dim); hvac.position.set(-7, BH + 0.7, 0); g.add(hvac);

const tmpVec = new THREE.Vector3();
function updateBadgePositions() {
  if (state.currentView === 'building') return;
  Object.entries(badgeElements).forEach(([id, div]) => {
    const hb = machineHitboxes[id], obj = machineObjects[id];
    if (!hb && !obj) return;
    // Anchor on the machine's center so the dot sits ON the machine at any zoom
    if (hb) tmpVec.copy(hb.position); else obj.getWorldPosition(tmpVec);
    const dist = camera.position.distanceTo(tmpVec);
    tmpVec.project(camera);
    if (tmpVec.z >= 1) { div.style.display = 'none'; return; }   // behind the camera
    const tel = state.telemetry[id];
    const expanded = state.selectedId === id;
    const isAlert = tel && (tel.status === 'error' || tel.status === 'maintenance');
    // Healthy dots shrink + fade with distance; alerts and the selected one stay full
    const scale = (expanded || isAlert) ? 1 : Math.max(0.5, Math.min(1.4, 26 / dist));
    const opacity = (expanded || isAlert) ? 1 : Math.max(0.4, Math.min(1, 1.4 - dist / 110));
    const anchor = expanded ? 'translate(-50%,-120%)' : 'translate(-50%,-50%)';
    div.style.display = 'block';
    div.style.left = `${(tmpVec.x * 0.5 + 0.5) * innerWidth}px`;
    div.style.top = `${(1 - (tmpVec.y * 0.5 + 0.5)) * innerHeight}px`;
    div.style.transform = `${anchor} scale(${scale.toFixed(2)})`;
    div.style.opacity = String(opacity);
    div.style.zIndex = String(Math.round((1 - tmpVec.z) * 1000));   // nearer dots on top
  });
}

/** Build an inline SVG sparkline from a machine's history ring buffer. */
function sparkline(hist, key, color) {
  const data = (hist || []).map(s => s[key]).filter(v => typeof v === 'number');
  if (data.length < 2) return `<div class="log-empty">collecting data…</div>`;
  const w = 300, h = 40, n = data.length;
  let min = Math.min(...data), max = Math.max(...data);
  if (max - min < 1e-6) max = min + 1;
  const pts = data.map((v, i) =>
    `${(i / (n - 1) * w).toFixed(1)},${(h - (v - min) / (max - min) * h).toFixed(1)}`
  ).join(' ');
  return `<svg viewBox="0 0 ${w} ${h}" preserveAspectRatio="none">
    <polyline points="${pts}" fill="none" stroke="${color}" stroke-width="1.5" vector-effect="non-scaling-stroke"/>
  </svg>`;
}

function healthColor(h) { return h >= 80 ? '#5ec8ff' : h >= 50 ? '#ffb84e' : '#ff5e5e'; }
function metricSeverity(metric, v) {
  const th = THRESHOLDS[metric]; if (!th) return null;
  return v >= th.critical ? 'critical' : v >= th.warning ? 'warning' : null;
}
/** Sparkline for one joint metric: fixed scale + warning/critical threshold lines. */
function metricSpark(hist, key) {
  const th = THRESHOLDS[key];
  const data = (hist || []).map(s => s[key]).filter(v => typeof v === 'number');
  if (data.length < 2) return `<div class="log-empty">collecting…</div>`;
  const w = 300, h = 38, n = data.length, max = th.critical * 1.25;
  const Y = v => (h - Math.min(v, max) / max * h).toFixed(1);
  const pts = data.map((v, i) => `${(i / (n - 1) * w).toFixed(1)},${Y(v)}`).join(' ');
  const last = data[data.length - 1];
  const col = last >= th.critical ? SEVERITY_COLORS.critical : last >= th.warning ? SEVERITY_COLORS.warning : '#5ec8ff';
  return `<svg viewBox="0 0 ${w} ${h}" preserveAspectRatio="none">
    <line x1="0" x2="${w}" y1="${Y(th.warning)}" y2="${Y(th.warning)}" stroke="${SEVERITY_COLORS.warning}" stroke-dasharray="4 3" opacity="0.45" vector-effect="non-scaling-stroke"/>
    <line x1="0" x2="${w}" y1="${Y(th.critical)}" y2="${Y(th.critical)}" stroke="${SEVERITY_COLORS.critical}" stroke-dasharray="4 3" opacity="0.55" vector-effect="non-scaling-stroke"/>
    <polyline points="${pts}" fill="none" stroke="${col}" stroke-width="1.5" vector-effect="non-scaling-stroke"/>
  </svg>`;
}

// ---- AI diagnosis: parse the Qwen Markdown into sections, then render ----
// parseDiagnosis works on both the live backend text and our mock FAULT_DIAGNOSES.
function parseDiagnosis(text) {
  const empty = { code: "", title: "AI Diagnosis", confidence: "", level: "Medium", evidence: [], rootCause: "", action: "", parts: "", cost: "" };
  if (!text || typeof text !== "string") return empty;
  const stripBold = (s) => s.replace(/\*\*(.*?)\*\*/g, "$1").trim();
  const section = (label) => {
    const re = new RegExp("\\*\\*" + label + "[^*]*?:\\*\\*([\\s\\S]*?)(?=\\n\\s*\\*\\*[^*]+:\\*\\*|\\n\\s*##\\s|$)", "i");
    return text.match(re)?.[1].trim() ?? "";
  };
  const code = text.match(/##\s*Diagnosis:\s*([^\n]+)/i)?.[1].trim() ?? "";
  const title = code ? code.toLowerCase().replace(/[_\s]+/g, " ").trim().replace(/\b\w/g, (c) => c.toUpperCase()) : "AI Diagnosis";
  const confidence = stripBold(section("Confidence"));
  const level = /high/i.test(confidence) ? "High" : /low/i.test(confidence) ? "Low" : "Medium";
  const evidence = section("Evidence").split("\n").map((l) => l.trim()).filter((l) => l.startsWith("- ")).map((l) => stripBold(l.slice(2).trim()));
  return {
    code, title, confidence, level, evidence,
    rootCause: stripBold(section("Root Cause")),
    action: stripBold(section("Action")),
    parts: stripBold(section("Parts")),
    cost: stripBold(section("Cost of Inaction")),
  };
}

function _diagActionBox(d) { return d.action ? `<div class="diag2-action"><span class="diag2-action-tag">ACTION</span>${d.action}</div>` : ''; }
function _diagPartsLine(d) { return d.parts ? `<div class="diag2-parts"><span class="diag2-k">PARTS</span> · ${d.parts}</div>` : ''; }

// Full body for the side-panel "AI DIAGNOSIS" section and the ticket modal.
function renderDiagnosis(d) {
  if (!d) return '<div class="diag2-empty">No diagnosis available.</div>';
  const titleRow = `<div class="diag2-titlerow"><span class="diag2-title">${d.title || 'Diagnosis'}</span>${_diagConfBadge(d)}</div>`;

  const rootCause = d.rootCause ? `<p class="diag2-root">${d.rootCause}</p>` : '';
  return [titleRow, evidence, rootCause, _diagActionBox(d), _diagPartsLine(d), _diagCostLine(d)].filter(Boolean).join('');
}

const TAP_PX = 6;

function dn(x, y) { dragging = true; downX = px = x; downY = py = y; moved = false; lastT = performance.now(); }
function mv(x, y) {
  if (!dragging) return;

  yaw += (x - px) * 0.006; pitch += (y - py) * 0.005;
  pitch = Math.max(0.05, Math.min(Math.PI/2 - 0.05, pitch));

}
function up(x, y) {

}

// Simulate a robot arm: per-joint sensors -> joint scores -> health -> alarms ->
// status -> prediction. Produces telemetry in the exact RoboLink WebSocket shape.
function simArm(id, t) {
  const prof = simProfiles[id];
  const joints = {};
  for (let j = 1; j <= 6; j++) {
    const ph = t * 1.5 + prof.seed + j;
    joints[j] = {
      joint_id: j,
      position: +(Math.sin(ph) * 1.5).toFixed(3),
      velocity: +(Math.cos(ph) * 0.8).toFixed(3),
      torque: 30 + Math.sin(ph * 0.7) * 8 + Math.random() * 4,
      temperature: 42 + Math.sin(ph) * 2 + Math.random() * 1.5,
      current: 3 + Math.random() * 0.8,
      vibration: 1.5 + Math.random() * 0.6,
      error_code: 0, score: 100
    };
  }
  // Apply an injected fault by ramping its signal(s) past threshold; nominal otherwise.
  const af = activeFaults[id];
  if (af) {
    const prog = Math.min(1, Math.max(0, (t - af.started) / af.ft.ramp));
    const jt = joints[af.joint];
    const targets = { [af.ft.metric]: af.ft.target, ...(af.ft.also || {}) };
    for (const m in targets) {
      const base = jt[m] ?? 0;
      let v = base + (targets[m] - base) * prog;
      if (af.ft.jitter) v += (Math.random() - 0.5) * targets[m] * 0.2 * prog;
      jt[m] = v;
    }
  }
  // Score joints + collect alarms (RoboLink: min*0.4 + avg*0.6)
  const alarms = [];
  let minScore = 100, sum = 0;
  for (let j = 1; j <= 6; j++) {
    const jt = joints[j]; let score = 100;
    JOINT_METRICS.forEach(metric => {
      const th = THRESHOLDS[metric], v = jt[metric];
      if (v >= th.critical) { score -= 45; pushAlarm(alarms, id, j, metric, 'critical', v, th.critical); }
      else if (v >= th.warning) { score -= 18; pushAlarm(alarms, id, j, metric, 'warning', v, th.warning); }
    });
    jt.score = +Math.max(0, score).toFixed(1);
    minScore = Math.min(minScore, jt.score); sum += jt.score;
  }
  const health_score = +(minScore * 0.4 + (sum / 6) * 0.6).toFixed(1);
  // An active alarm degrades the displayed status even if aggregate health (dragged by a
  // single bad joint) stays high: any critical alarm → error/protective-stop (as a real
  // robot would), any warning alarm → maintenance.
  const hasCritical = alarms.some(a => a.severity === 'critical');
  const hasWarning = alarms.some(a => a.severity === 'warning');
  const status = (hasCritical || health_score < 50) ? 'error'
               : (hasWarning || health_score < 80) ? 'maintenance' : 'running';
  const safety_state = (hasCritical || health_score < 50) ? 'protective_stop' : 'normal';
  // Prediction: days-to-failure for the faulted joint's climbing metric.
  // Scales from ~14 days at the warning line down to ~0.3 days at/over critical.
  let prediction = null;
  if (af) {
    const jt = joints[af.joint], metric = af.ft.metric, th = THRESHOLDS[metric];
    if (th && jt[metric] > th.warning) {
      const cur = jt[metric], crit = th.critical;
      const span = Math.max(0.001, crit - th.warning);
      const frac = Math.min(1, Math.max(0, (crit - cur) / span));   // 1 at warning, 0 at critical
      prediction = {
        robot_id: id, joint_id: af.joint, metric,
        days_to_failure: +(0.3 + frac * 13.7).toFixed(1),
        confidence: af.confidence, trend_slope: +(0.001 * (2 - frac)).toFixed(4),
        current_value: +cur.toFixed(1), critical_threshold: crit
      };
    }
  }
  const diagnosis = af ? { robot_id: id, joint_id: af.joint, diagnosis: af.ft.diagnosis, model: 'RoboLink AI' } : null;
  updateTelemetry(id, { joints, alarms, health_score, status, safety_state, prediction, diagnosis });
}

// Simulate a non-arm machine: lighter telemetry. Ambient life only — gentle idle<->running
// drift for a believable floor; never random faults (faults are injected deliberately).
function simMachine(id, t) {
  const tel = state.telemetry[id];
  if (Math.random() < 0.015) updateTelemetry(id, { status: tel.status === 'running' ? 'idle' : 'running' });
  if (state.telemetry[id].status === 'running') {
    updateTelemetry(id, {
      partsProcessed: (tel.partsProcessed || 0) + Math.floor(1 + Math.random() * 3),
      utilization: 0.6 + Math.random() * 0.35, temperature: 34 + Math.random() * 12,
      rpm: 1050 + Math.random() * 320, health_score: 80 + Math.random() * 20
    });
  }
}

// ---- Mock loop (fallback / offline demo) ----
const _t0 = performance.now();
// When the backend is connected (_live), it drives the mapped arms — EXCEPT any machine
// with an injected fault, which the mock keeps overriding so manual fault demos work on
// top of live data. Non-arm machines always run on mock ambiance (the backend has no data
// for them). The loop runs continuously; it just self-selects what to update.
let _live = false;
let _mockTimer = null;
function startMock() {
  if (_mockTimer) return;
  _mockTimer = setInterval(() => {
    const t = (performance.now() - _t0) / 1000;
    Object.keys(state.telemetry).forEach(id => {
      if (activeFaults[id]) { simArm(id, t); return; }       // injected fault overrides everything
      if (_live && LIVE_MACHINES.has(id)) return;            // live backend drives this arm
      if (state.telemetry[id].joints) simArm(id, t); else simMachine(id, t);
    });
  }, 1000);
}

// ---- Live RoboLink WebSocket client ----
// The 3 backend robots (Robot1..3) map onto 3 arm machines in our LAYOUT.
const ROBOT_MAP = { Robot1: 'ARM-01', Robot2: 'ARM-02', Robot3: 'ARM-03' };
const LIVE_MACHINES = new Set(Object.values(ROBOT_MAP));   // arms driven by the live backend
// Deployed backend (Railway) — the live data source for the hosted dashboard.
const RL_LIVE_WS = 'wss://web-production-27a5.up.railway.app/ws';
// WebSocket endpoint, resolved in priority order:
//   1. ?ws=wss://host/ws  query param   — override per-visit, no rebuild
//   2. window.ROBOLINK_WS_URL           — set via an inline <script> before this file
//   3. https pages → the live Railway backend (real data + AI on the hosted site)
//   4. http pages  → ws://<host>:8000/ws   — local dev default (sim_server + uvicorn)
const RL_WS_URL =
  new URLSearchParams(location.search).get('ws')
  || window.ROBOLINK_WS_URL
  || (location.protocol === 'https:'
        ? RL_LIVE_WS
        : `ws://${location.hostname || 'localhost'}:8000/ws`);
const _diagByRobot = {};   // robot_id -> latest AI diagnosis

function statusFromHealth(h, raw) {
  if (raw === 'stopped' || raw === 'offline') return 'offline';
  if (raw === 'error') return 'error';
  return h < 50 ? 'error' : h < 80 ? 'maintenance' : 'running';
}
function applyRoboLinkUpdate(data) {
  if (data.diagnosis && data.diagnosis.robot_id) _diagByRobot[data.diagnosis.robot_id] = data.diagnosis;
  const alarmsByRobot = {}, predByRobot = {};
  (data.alarms || []).forEach(a => (alarmsByRobot[a.robot_id] ||= []).push(a));
  (data.predictions || []).forEach(p => { if (!predByRobot[p.robot_id]) predByRobot[p.robot_id] = p; });
  Object.values(data.robots || {}).forEach(r => {
    const id = ROBOT_MAP[r.robot_id];
    if (!id || !state.telemetry[id]) return;
    if (activeFaults[id]) return;   // injected fault overrides live data for this machine
    updateTelemetry(id, {
      vendor: r.vendor, model: r.model, joints: r.joints, health_score: r.health_score,
      safety_state: r.safety_state || 'normal', status: statusFromHealth(r.health_score, r.status),
      alarms: alarmsByRobot[r.robot_id] || [], prediction: predByRobot[r.robot_id] || null,
      diagnosis: _diagByRobot[r.robot_id] || null
    });
  });
}
function applyDiagnosis(d) {
  if (!d || !d.robot_id) return;
  _diagByRobot[d.robot_id] = d;
  const id = ROBOT_MAP[d.robot_id];
  if (id && state.telemetry[id] && !activeFaults[id]) updateTelemetry(id, { diagnosis: d });
}

// The mock loop runs continuously (instant life + non-arm ambiance + fault overrides).
// When the backend connects, _live=true and the loop yields the mapped arms to live data;
// if the socket drops, _live=false and the mock seamlessly takes the arms back.
function startSimulator() {              // name kept so BOOT (Section 15) is unchanged
  startMock();
  let backoff = 1000;
  const connect = () => {
    let ws;
    try { ws = new WebSocket(RL_WS_URL); } catch (_) { return; }
    ws.onopen = () => { backoff = 1000; };
    ws.onmessage = e => {
      if (!_live) { _live = true; console.info('RoboLink: live data connected'); }
      let data; try { data = JSON.parse(e.data); } catch (_) { return; }
      if (data.type === 'diagnosis') applyDiagnosis(data);
      else applyRoboLinkUpdate(data);
    };
    ws.onerror = () => ws.close();
    ws.onclose = () => {
      _live = false;
      setTimeout(connect, backoff); backoff = Math.min(backoff * 2, 30000);
    };
  };
  connect();
}

// =============================================================================
//   SECTION 15 — BOOT
// =============================================================================

subscribe(() => { updateBadgeContents(); updateMachineColors(); renderPanel(); updateHud(); updateFloorDash(); renderFaultCtrl(); });

// Maintenance Queue board toggle
document.getElementById('mqToggle').addEventListener('click', () => mqEl.classList.toggle('open'));
document.getElementById('mqClose').addEventListener('click', () => mqEl.classList.remove('open'));
renderBoard();

showView('building');
startSimulator();

const clock = new THREE.Clock();
function frame() {
  requestAnimationFrame(frame);
  const t = clock.getElapsedTime();
  if (animators[state.currentView]) animators[state.currentView](t);
  // Pulse machines in error so a fault grabs attention on the floor itself
  if (state.currentView !== 'building') {
    const fl = LAYOUT.floors.find(f => f.id === state.currentView);
    if (fl) fl.machines.forEach(m => {
      const tel = state.telemetry[m.id], obj = machineObjects[m.id];
      if (tel && tel.status === 'error' && obj && obj.userData.statusMats) {
        const o = 0.45 + 0.5 * Math.abs(Math.sin(t * 4));
        obj.userData.statusMats.forEach(mat => { mat.opacity = o; });
      }
    });
  } else {
    // Building view: softly fade the hovered floor's accent glow in (others out).
    for (const id in buildingHighlights) {
      const glow = buildingHighlights[id];
      const target = (id === hoveredFloor) ? 0.24 + 0.06 * Math.sin(t * 3) : 0;
      glow.material.opacity += (target - glow.material.opacity) * 0.15;
    }
    // Anchor to the building's central vertical axis (world x=0), which projects
    // to a fixed screen-x no matter how the building is rotated, then offset right
    // by a fixed amount to sit just beside it. Vertical follows the hovered floor.
    if (hoveredFloor && buildingHighlights[hoveredFloor] && floorDashEl.style.display !== 'none') {
      dashVec.set(0, buildingHighlights[hoveredFloor].position.y, 0).project(camera);
      const cx = (dashVec.x * 0.5 + 0.5) * innerWidth;
      const cy = (1 - (dashVec.y * 0.5 + 0.5)) * innerHeight;
      floorDashEl.style.left = `${cx + 230}px`;
      floorDashEl.style.top = `${Math.max(90, Math.min(innerHeight - 90, cy))}px`;
    }
  }
  // Camera
  if (performance.now() - lastT > 1500) auto += 0.0022;
  const cfg = camConfigs[state.currentView];
  const ry = yaw + auto;
  camera.position.set(radius * Math.cos(pitch) * Math.sin(ry), radius * Math.sin(pitch) + 1, radius * Math.cos(pitch) * Math.cos(ry));
  camera.lookAt(cfg.lookX, cfg.lookY, cfg.lookZ);
  renderer.render(scene, camera);
  updateBadgePositions();
}
frame();
</script>
